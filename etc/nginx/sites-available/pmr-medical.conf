server {
    server_name paradigmuc.com www.paradigmuc.com;

    root /var/www/PMR-Medical/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    client_max_body_size 1048M;
    
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    location /jobcan-api/ {
        proxy_pass http://127.0.0.1:8502/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ /\.ht {
        deny all;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/paradigmuc.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/paradigmuc.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    
}
server {
    if ($host = paradigmuc.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name paradigmuc.com www.paradigmuc.com;
    return 404; # managed by Certbot


}
